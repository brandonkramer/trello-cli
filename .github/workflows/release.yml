name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # GitHub Release
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm # must match the npm Trusted Publisher config
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # node 22 bundles npm 10; trusted publishing needs npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG)" >&2
            exit 1
          fi

      # prepublishOnly runs typecheck + test + lint before the tarball is uploaded.
      # Auth comes from the OIDC trusted publisher; provenance is automatic.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Strip v prefix from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump tap formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: trelly
          homebrew-tap: brandonkramer/homebrew-tap
          download-url: https://registry.npmjs.org/trelly/-/trelly-${{ steps.ver.outputs.version }}.tgz
          commit-message: |
            trelly {{version}}
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
