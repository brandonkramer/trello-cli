name: Pages

on:
  push:
    branches: [main]
    paths: ["powerup/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-cloudflare:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy powerup
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-github:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: powerup

  # separate job so re-running a failed deploy never re-uploads the artifact
  deploy-github-pages:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT == '' }}
    needs: deploy-github
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
